root: "data"
batch_size: 4
instances_per_identity: 4
num_workers: 4
epochs: 30
early_stopping_patience: 5
early_stopping_min_delta: 0.001
lr: 1e-5
weight_decay: 1e-4
temperature: 0.1
image_size: 288
projection_hidden_dim: 256
projection_dropout: 0.0
checkpoint_dir: "checkpoints_simclr"
embedding_checkpoint_path: "artifacts/embedding_checkpoints/embedding_backbone.pt"
embeddings_output_dir: "artifacts/embeddings"
max_samples: null
normalize_embeddings: true
gallery_validation_output_dir: "artifacts/gallery_validation"
validation_random_seed: 42
known_val_ratio: 0.20
unseen_val_ratio: 0.20
thresholds_output_dir: "artifacts/thresholds"
threshold_search_steps: 50
matching_output_dir: "artifacts/matching"
matching_top_k: 5
rejection_output_dir: "artifacts/rejection"
clustering_output_dir: "artifacts/clustering"
clustering_similarity_threshold: 0.80
clustering_min_cluster_size: 1
refinement_output_dir: "artifacts/refinement"
refinement_min_cluster_size: 2
refinement_min_cluster_similarity: 0.85
refinement_known_confidence_threshold: 0.90
final_output_dir: "artifacts/final"
final_assignments_filename: "submission.csv"
